<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Profile — Second Brain</title>
  <link rel="stylesheet" href="share.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div id="content" class="profile-page hidden">
    <!-- Header -->
    <header class="profile-header">
      <div class="header-inner">
        <a href="../login/index.html" class="glass-pill glow-cyan btn-liquid">Join Second Brain</a>
      </div>
    </header>

    <main class="profile-main">
      <div class="container">
        
        <!-- Hero Section -->
        <section class="hero-section">
          <div class="pfp-wrapper">
            <img id="pfp" src="" alt="Profile Photo" class="pfp-img hidden">
            <div id="pfp-placeholder" class="pfp-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
          </div>
          <h1 id="name" class="profile-name">Full Name</h1>
          <p id="email" class="profile-email">email@example.com</p>
        </section>

        <!-- Linktree-style Buttons -->
        <section class="hero-socials">
          <a id="github-link" href="#" target="_blank" class="glass-pill glow-primary social-link hidden">GitHub</a>
          <a id="linkedin-link" href="#" target="_blank" class="glass-pill glow-primary social-link hidden">LinkedIn</a>
          <a id="portfolio-link" href="#" target="_blank" class="glass-pill glow-primary social-link hidden">Portfolio Website</a>
          
          <a id="resume-btn" href="#" target="_blank" class="glass-pill glow-magenta social-link hidden">
            Download Professional Resume
          </a>

          <!-- Professional Links -->
          <div id="intern-wrap" class="detail-item hidden">
            <label>Internship</label>
            <a id="intern-link" href="#" target="_blank" class="glass-pill glow-cyan social-link">View Internship Details</a>
          </div>

          <div id="project-wrap" class="detail-item hidden">
            <label>Projects</label>
            <a id="project-link" href="#" target="_blank" class="glass-pill glow-mint social-link">View Project Portfolio</a>
          </div>

          <div id="cert-wrap" class="detail-item hidden">
            <label>Certifications</label>
            <a id="cert-link" href="#" target="_blank" class="glass-pill glow-magenta social-link">View Certifications</a>
          </div>

          <!-- Contact -->
          <div id="phone-wrap" class="detail-item hidden">
            <label>Phone</label>
            <p id="phone" class="glass-pill social-link">Phone number</p>
          </div>
        </section>

      </div>
    </main>

    <footer class="footer">
      <p>© 2026 Second Brain Inc. • Professional Profile</p>
    </footer>
  </div>

  <div id="error-screen" class="error-screen hidden">
    <div class="container" style="text-align: center; padding-top: 10rem;">
      <h1>Profile Not Found</h1>
      <a href="../login/index.html" class="glass-pill glow-primary btn-liquid" style="margin-top: 2rem;">Back to Home</a>
    </div>
  </div>

  <script type="module" src="share.js"></script>
</body>
</html>
