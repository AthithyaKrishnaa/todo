<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Profile — Second Brain</title>
  <link rel="stylesheet" href="share.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay">
    <div class="loading-ring"></div>
  </div>

  <!-- Main Content -->
  <div id="content" class="page-wrapper hidden">

    <!-- Ambient BG -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <main class="profile-card" id="profile-card">

      <!-- ── 1. Header ─── -->
      <div class="profile-header">
        <div class="avatar-ring">
          <div class="avatar-glow"></div>
          <img id="pfp" src="" alt="Profile Photo" class="avatar-img hidden">
          <div id="pfp-placeholder" class="avatar-placeholder">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <h1 id="name" class="profile-name">Loading...</h1>
        <a id="header-email" href="mailto:" class="profile-email"></a>
      </div>

      <!-- ── 2. Primary Actions ─── -->
      <div class="btn-group">
        <a id="github-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="cyan">
          <span class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
          </span>
          GitHub
        </a>
        <a id="linkedin-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="blue">
          <span class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
          </span>
          LinkedIn
        </a>
        <a id="portfolio-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="purple">
          <span class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </span>
          Portfolio Website
        </a>
        <a id="resume-btn" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="pink">
          <span class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </span>
          Download Resume
        </a>
      </div>

      <!-- ── 3. Professional Sections ─── -->
      <div id="pro-section" class="section-group hidden">
        <span class="section-label">Professional</span>
        <div class="btn-group">
          <a id="intern-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="mint">
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            </span>
            View Internship Details
          </a>
          <a id="project-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="cyan">
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            </span>
            View Project Portfolio
          </a>
          <a id="cert-link" href="#" target="_blank" rel="noopener" class="glass-btn hidden" data-glow="gold">
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
            </span>
            View Certifications
          </a>
        </div>
      </div>

      <!-- ── 4. Contact ─── -->
      <div id="contact-section" class="section-group hidden">
        <span class="section-label">Contact</span>
        <div class="btn-group">
          <a id="phone-link" href="tel:" class="glass-btn hidden" data-glow="green">
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>
            </span>
            <span id="phone-text">Phone</span>
          </a>
          <a id="email-link" href="mailto:" class="glass-btn hidden" data-glow="blue">
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <span id="email-text">Email</span>
          </a>
        </div>
      </div>

      <!-- Footer -->
      <p class="card-footer">Made with Second Brain</p>

    </main>
  </div>

  <!-- Error State -->
  <div id="error-screen" class="error-screen hidden">
    <div class="error-content">
      <div class="error-icon">◎</div>
      <h2>Profile Not Found</h2>
      <p>This profile doesn't exist or has been made private.</p>
      <a href="../login/index.html" class="glass-btn" data-glow="purple" style="margin-top: 1.5rem; display: inline-flex;">Back to Home</a>
    </div>
  </div>

  <script type="module" src="share.js"></script>
</body>
</html>
