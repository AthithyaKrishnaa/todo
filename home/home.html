<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Second Brain</title>
  <link rel="stylesheet" href="home.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
</head>
<body class="has-sidebar">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">Second Brain</span>
    </div>
    <nav class="sidebar-nav">
      <button class="side-nav-item active" data-target="section-notes">
        Notes
      </button>
      <button class="side-nav-item" data-target="section-vault">
        Vault
      </button>
      <button class="side-nav-item" data-target="section-profile">
        Profile
      </button>
    </nav>
  </aside>

  <!-- ── Auth guard overlay (shown while checking session) ── -->
  <div id="auth-guard" class="auth-guard">
    <div class="guard-spinner"></div>
  </div>

  <!-- ════════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-name">Second Brain</span>
        <span class="note-badge" id="note-badge">0</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn btn-liquid" id="theme-btn" title="Toggle theme" aria-label="Toggle dark mode">◐</button>
        <button class="icon-btn danger btn-liquid" id="logout-btn" title="Sign out" aria-label="Sign out">→</button>
      </div>
    </div>
  </header>

  <!-- ════════════════════════════════════════
       MAIN SECTIONS CONTAINER
  ════════════════════════════════════════ -->
  <main class="main-content">
  
    <!-- === NOTES SECTION === -->
    <div id="section-notes" class="app-section active">

      <!-- ════════════════════════════════════════
           DASHBOARD (NOW AT TOP)
      ════════════════════════════════════════ -->
      <section class="section dashboard">

        <!-- Filters -->
        <div class="filter-bar" role="tablist">
          <button type="button" class="filter-btn active" data-filter="pending" role="tab" aria-selected="true">Pending</button>
          <button type="button" class="filter-btn" data-filter="accomplished" role="tab" aria-selected="false">Accomplished</button>
        </div>

        <!-- Notes area -->
        <div id="notes-area" class="scrollable-notes">
          <div id="notes-loading" class="loading-wrap">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
          <div id="notes-list" class="notes-list hidden"></div>
          <div id="empty-state" class="empty-state hidden">
            <p class="empty-icon">◎</p>
            <p class="empty-title" id="empty-title">No notes yet</p>
            <p class="empty-desc" id="empty-desc">Write something below to get started.</p>
          </div>
        </div>
      </section>

      <!-- ════════════════════════════════════════
           CAPTURE BOX (NOW AT BOTTOM)
      ════════════════════════════════════════ -->
      <section class="section">
        <div class="capture-box" id="capture-box">
          <textarea
            id="note-input"
            class="note-input"
            placeholder="Capture a thought, link, or task… (Ctrl+Enter to save)"
            rows="3"
            maxlength="2000"
          ></textarea>

          <!-- Tags -->
          <div class="row tags-row">
            <span class="row-label">Tag</span>
            <div class="tag-group">
              <button type="button" class="tag-chip" data-tag="idea"      aria-pressed="false">💡 Idea</button>
              <button type="button" class="tag-chip" data-tag="study"     aria-pressed="false">📚 Study</button>
              <button type="button" class="tag-chip" data-tag="important" aria-pressed="false">⚡ Important</button>
              <button type="button" class="tag-chip" data-tag="task"      aria-pressed="false">✅ Task</button>
            </div>
          </div>


          <!-- Footer -->
          <div class="capture-footer">
            <span class="char-count" id="char-count">0 / 2000</span>
            <button type="button" class="btn-liquid primary" id="save-btn">Save note</button>
          </div>
        </div>
        <div class="inline-status hidden" id="save-status"></div>
      </section>
    </div> <!-- /section-notes -->

    <!-- === VAULT SECTION === -->
    <div id="section-vault" class="app-section hidden">
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Vault</h2>
          <p class="section-subtitle">Your links & documents</p>
        </div>

        <div class="vault-grid">
          <!-- Links Column -->
          <div class="vault-col">
            <div class="col-header"><h3>Links</h3></div>
            <div class="capture-box small-capture">
              <input type="text" id="link-heading" class="note-input single-line" placeholder="Link Heading..." maxlength="255" />
              <input type="url" id="link-url" class="note-input single-line" placeholder="https://..." />
              <div class="capture-footer">
                <button type="button" class="btn-liquid" id="save-link-btn">Save Link</button>
              </div>
            </div>
            
            <!-- Links Loading Skeleton -->
            <div id="links-loading" class="loading-wrap">
              <div class="skeleton small"></div>
            </div>
            <div id="links-list" class="notes-list hidden"></div>
          </div>

          <!-- Documents Column -->
          <div class="vault-col">
            <div class="col-header"><h3>Documents</h3></div>
            <div class="capture-box small-capture">
              <input type="text" id="doc-heading" class="note-input single-line" placeholder="Document Heading..." maxlength="255" />
              <div class="file-input-row">
                <input type="file" id="doc-file" class="file-input-native" />
              </div>
              <div class="capture-footer">
                <span id="doc-upload-status" class="char-count"></span>
                <button type="button" class="btn-liquid" id="save-doc-btn">Upload</button>
              </div>
            </div>

            <!-- Docs Loading Skeleton -->
            <div id="docs-loading" class="loading-wrap">
              <div class="skeleton small"></div>
            </div>
            <div id="docs-list" class="notes-list hidden"></div>
          </div>
        </div>
      </section>
    </div> <!-- /section-vault -->

    <!-- === PROFILE SECTION === -->
    <div id="section-profile" class="app-section hidden">
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Profile</h2>
          <p class="section-subtitle">Manage & share your details</p>
        </div>

        <div class="profile-grid">
          <div class="capture-box profile-form">
            <div class="col-header"><h3>Your Details</h3></div>
            <div class="form-group">
              <label>Name</label><input type="text" id="prof-name" class="profile-input" placeholder="Your full name" />
            </div>
            <div class="form-group">
              <label>Phone</label><input type="text" id="prof-phone" class="profile-input" placeholder="+1..." />
            </div>
            <div class="form-group">
              <label>Mail id</label><input type="email" id="prof-email" class="profile-input" placeholder="mail@example.com" />
            </div>
            <div class="form-group">
              <label>Resume Link</label><input type="url" id="prof-resume-link" class="profile-input" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label>GitHub Link</label><input type="url" id="prof-github" class="profile-input" placeholder="https://github.com/..." />
            </div>
            <div class="form-group">
              <label>LinkedIn Link</label><input type="url" id="prof-linkedin" class="profile-input" placeholder="https://linkedin.com/..." />
            </div>
            <div class="form-group">
              <label>Internship Details Link</label><input type="url" id="prof-internship" class="profile-input" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label>Project Details Link</label><input type="url" id="prof-project" class="profile-input" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label>Certifications Details Link</label><input type="url" id="prof-certs" class="profile-input" placeholder="https://..." />
            </div>
            <div class="capture-footer">
               <span id="prof-save-status" class="char-count"></span>
               <button type="button" class="btn-liquid primary" id="save-prof-btn">Update Details</button>
            </div>
          </div>

          <div class="profile-share">
             <div class="col-header"><h3>Share Details</h3></div>
             <p class="share-desc">Select details to include, then copy to clipboard.</p>
             
             <div class="capture-box share-box">
               <div class="share-options" id="share-options">
                 <!-- Filled via JS -->
               </div>
               <div class="share-options" style="padding-top: 0;">
                 <label class="share-option">
                   <input type="checkbox" id="include-watermark" checked />
                   <span><b>Include Watermark</b></span>
                 </label>
               </div>
               <div class="capture-footer share-actions">
                 <button type="button" class="btn-liquid btn-full" id="copy-prof-btn">Copy Professional Details</button>
               </div>
             </div>
          </div>
        </div>
      </section>
    </div> <!-- /section-profile -->

  </main>

  <!-- ════════════════════════════════════════
       BOTTOM NAVIGATION
  ════════════════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="section-notes" aria-label="Notes">
       <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <span class="nav-label">Notes</span>
    </button>
    <div class="nav-divider"></div>
    <button class="nav-item" data-target="section-vault" aria-label="Vault">
       <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <span class="nav-label">Vault</span>
    </button>
    <div class="nav-divider"></div>
    <button class="nav-item" data-target="section-profile" aria-label="Profile">
       <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- ════════════════════════════════════════
       TOAST
  ════════════════════════════════════════ -->
  <div id="status-card" class="status-card" role="status" aria-live="polite">
    <div class="status-content" id="status-msg"></div>
    <div class="status-progress-wrap">
      <div class="status-progress-bar" id="status-bar"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       CONFIRM DIALOG
  ════════════════════════════════════════ -->
  <div id="confirm-overlay" class="overlay hidden" aria-modal="true" role="dialog">
    <div class="confirm-box">
      <p class="confirm-msg" id="confirm-msg">Delete this note?</p>
      <div class="confirm-actions">
        <button type="button" class="confirm-cancel" id="confirm-cancel">Cancel</button>
        <button type="button" class="confirm-ok danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       SVG FILTERS (For Liquid Glass)
  ════════════════════════════════════════ -->
  <svg class="hidden" style="position: absolute; width: 0; height: 0;">
    <defs>
      <filter id="container-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence" />
        <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise" />
        <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="20" xChannelSelector="R" yChannelSelector="B" result="displaced" />
        <feGaussianBlur in="displaced" stdDeviation="1" result="finalBlur" />
        <feComposite in="finalBlur" in2="finalBlur" operator="over" />
      </filter>
    </defs>
  </svg>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../config.js"></script>
  <script src="home.js"></script>
</body>
</html>
