<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Second Brain</title>
  <link rel="stylesheet" href="home.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
</head>

<body class="has-sidebar">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="/logo.png" alt="Second Brain" class="brand-logo sidebar-logo" />
      <span class="sidebar-version">v8</span>
    </div>
    <nav class="sidebar-nav">
      <button class="side-nav-item active" data-target="section-notes">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Notes
      </button>
      <button class="side-nav-item" data-target="section-profile">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Profile
      </button>
    </nav>
  </aside>

  <!-- Auth guard overlay -->
  <div id="auth-guard" class="auth-guard">
    <div class="guard-spinner"></div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="/logo.png" alt="The Second Brain" class="header-logo" />
        <span class="version-tag">v8</span>
      </div>
      
      <div class="header-right">
        <span class="header-clock" id="header-clock">10:40 PM</span>
        <button class="logout-pill" id="logout-btn" title="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- Notes Section -->
    <div id="section-notes" class="app-section active">
      
      <!-- Filter bar (Pill style) -->
      <div class="pill-nav-container">
        <div class="filter-bar" id="filter-bar" data-state="pending">
          <div class="filter-glass" id="filter-glass"></div>
          <button type="button" class="filter-btn active" data-filter="pending">Pending</button>
          <button type="button" class="filter-btn" data-filter="accomplished">Accomplished</button>
        </div>
      </div>

      <!-- Notes Area (The card-filled container from the image) -->
      <div class="notes-container">
        <div id="notes-area" class="scrollable-notes">
          <div id="notes-loading" class="loading-wrap">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
          <div id="notes-list" class="notes-list hidden"></div>
          <div id="empty-state" class="empty-state hidden">
            <p class="empty-icon">◎</p>
            <p>No notes here</p>
          </div>
        </div>
      </div>

      <!-- Capture Box (The floating block at the bottom) -->
      <div class="sticky-capture">
        <div class="capture-widget" id="capture-box">
          <div class="capture-input-area">
            <textarea id="note-input" class="note-input" placeholder="Capture a thought..." rows="1" maxlength="2000"></textarea>
          </div>
          
          <div class="capture-controls">
            <div class="char-count" id="char-count">0 / 2000</div>
            
            <div class="capture-actions">
              <button type="button" class="btn-smart" id="smart-save-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.912 5.813L21 12l-7.088 3.187L12 21l-1.912-5.813L3 12l7.088-3.187L12 3z"/></svg>
                Smart Save
              </button>
              <button type="button" class="btn-save" id="save-btn">Save note</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Profile Section (Simplified for now, will keep logic) -->
    <div id="section-profile" class="app-section hidden">
       <!-- (Profile content remains similar but styled with new theme) -->
       <div class="container-narrow">
          <div class="profile-header-alt">
             <div class="avatar-ring" id="avatar-container">
                <img id="avatar-img" src="" class="avatar-img" />
                <div id="avatar-placeholder" class="avatar-ph">◎</div>
             </div>
             <button id="avatar-upload-btn" class="btn-ghost">Update Photo</button>
          </div>
          <!-- Form fields following theme... -->
          <div class="theme-card">
              <div class="form-group">
                 <label>Name</label>
                 <input type="text" id="prof-name" class="theme-input" />
              </div>
              <button id="save-prof-btn" class="btn-theme-primary">Update Profile</button>
          </div>
       </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="section-notes">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <span class="nav-label">Notes</span>
    </button>
    <button class="nav-item" data-target="section-profile">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- UI Components -->
  <div id="status-card" class="status-card">
    <div id="status-msg"></div>
  </div>
  
  <div id="confirm-overlay" class="overlay hidden">
    <div class="confirm-modal">
      <p id="confirm-msg">Delete this note?</p>
      <div class="confirm-btns">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok" class="danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="cropper-overlay" class="overlay hidden">
    <div class="cropper-box">
      <img id="cropper-image" src="" />
      <div class="cropper-btns">
        <button id="cropper-cancel-btn">Cancel</button>
        <button id="cropper-confirm-btn" class="primary">Crop & Set</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script type="module" src="home.js"></script>
</body>

</html>
